version: '3.8'

services:
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    volumes:
      - .:/var/www/html:rw
      - vendor:/var/www/html/vendor
      - assets_vendor:/var/www/html/public/assets/vendor
      - var:/var/www/html/var
      - uploads:/var/www/html/public/uploads
      - thumbs:/var/www/html/public/thumbs
      - secured:/var/www/html/securedSpace
    environment:
      APP_ENV: ${APP_ENV:-dev}
      DATABASE_URL: mysql://${MYSQL_USER:-sagefemme}:${MYSQL_PASSWORD:-sagefemme}@database:3306/${MYSQL_DATABASE:-sagefemme}?serverVersion=mariadb-11.4.0&charset=utf8mb4
    depends_on:
      database:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - .:/var/www/html:ro
      - assets_vendor:/var/www/html/public/assets/vendor:ro
      - uploads:/var/www/html/public/uploads:ro
      - thumbs:/var/www/html/public/thumbs:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
    restart: unless-stopped

  database:
    image: mariadb:11.4
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-sagefemme}
      MYSQL_USER: ${MYSQL_USER:-sagefemme}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-sagefemme}
    volumes:
      - db-data:/var/lib/mysql:rw
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  db-data:
  uploads:
  thumbs:
  secured:
  vendor:
  assets_vendor:
  var:
