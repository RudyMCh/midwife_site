version: '3.8'

# Surcharges de développement uniquement
services:
  php:
    environment:
      APP_ENV: dev
      APP_DEBUG: 1
    volumes:
      - ./docker/php/php.dev.ini:/usr/local/etc/php/conf.d/app-dev.ini:ro

  nginx:
    ports:
      - "8080:80"

  database:
    ports:
      - "3307:3306"

  mailer:
    image: schickling/mailcatcher
    ports:
      - "1080:1080"
